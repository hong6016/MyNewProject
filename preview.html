<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Galaxy Watch 6 Classic - B Style Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
  }

  h1 {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* 갤럭시 워치 6 클래식 베젤 */
  .watch-bezel {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
    box-shadow:
      0 0 0 6px #2a2a2a,
      0 0 0 10px #444,
      0 0 0 14px #2a2a2a,
      0 30px 60px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* 베젤 눈금 */
  .bezel-marks {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }

  /* 워치 화면 */
  .watch-screen {
    width: 268px;
    height: 268px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    background: #111;
  }

  /* 배경 이미지 */
  .bg-image {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center top;
    filter: brightness(0.55) blur(0.5px);
  }

  /* 배경 없을때 폴백 */
  .bg-fallback {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 40%, #2c3e50, #1a252f 70%, #0d1117);
  }

  /* 그라디언트 오버레이 (하단 정보 가독성) */
  .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      ellipse at center,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.15) 50%,
      rgba(0,0,0,0.55) 100%
    );
  }

  /* SVG 시계판 */
  .clock-svg {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  /* 컴플리케이션 컨테이너 */
  .complications {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  /* 날짜 */
  .date-display {
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.9);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* 구분선 */
  .divider {
    width: 100px;
    height: 1px;
    background: rgba(255,255,255,0.3);
    margin: 2px 0;
  }

  /* 하단 정보 행 */
  .info-row {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .complication-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .complication-icon {
    font-size: 10px;
    opacity: 0.7;
  }

  .complication-value {
    font-size: 10px;
    font-weight: 600;
    color: #fff;
  }

  .complication-label {
    font-size: 7px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
  }

  /* 배터리 바 */
  .battery-bar {
    width: 24px;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 2px;
  }

  .battery-fill {
    height: 100%;
    background: #4CAF50;
    border-radius: 3px;
    transition: width 1s;
  }

  /* 시계 중앙 도트 */
  .center-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
  }

  /* 정보 패널 */
  .info-panel {
    margin-top: 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    max-width: 340px;
  }

  .info-panel strong {
    color: #fff;
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .info-panel .tag {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    padding: 2px 8px;
    border-radius: 10px;
    margin: 2px;
    font-size: 10px;
    color: #ccc;
  }
</style>
</head>
<body>

<h1>Galaxy Watch 6 Classic · B Style Preview</h1>

<div class="watch-bezel">
  <!-- 베젤 눈금 (SVG) -->
  <svg class="bezel-marks" viewBox="0 0 320 320">
    <g id="bezel-ticks">
      <!-- 60개 눈금 -->
    </g>
  </svg>

  <div class="watch-screen">
    <!-- 배경 이미지 -->
    <div class="bg-fallback"></div>
    <div class="bg-image" id="bgImage"></div>
    <div class="overlay"></div>

    <!-- 아날로그 시계 SVG -->
    <svg class="clock-svg" viewBox="0 0 268 268" id="clockSvg">

      <!-- 시간 눈금 -->
      <g id="hour-marks"></g>

      <!-- 시침 -->
      <line id="hour-hand"
        x1="134" y1="134"
        x2="134" y2="95"
        stroke="white"
        stroke-width="4"
        stroke-linecap="round"
        stroke-opacity="0.95"
        transform-origin="134 134"/>

      <!-- 분침 -->
      <line id="minute-hand"
        x1="134" y1="134"
        x2="134" y2="78"
        stroke="white"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-opacity="0.9"
        transform-origin="134 134"/>

      <!-- 초침 -->
      <line id="second-hand"
        x1="134" y1="150"
        x2="134" y2="70"
        stroke="#ff4444"
        stroke-width="1.5"
        stroke-linecap="round"
        transform-origin="134 134"/>

      <!-- 중앙 도트 -->
      <circle cx="134" cy="134" r="4" fill="white" opacity="0.95"/>
      <circle cx="134" cy="134" r="2" fill="#ff4444"/>
    </svg>

    <!-- 컴플리케이션 -->
    <div class="complications">
      <div class="date-display" id="dateDisplay">MON · MAR 16</div>
      <div class="divider"></div>
      <div class="info-row">
        <!-- 배터리 -->
        <div class="complication-item">
          <span class="complication-icon">🔋</span>
          <span class="complication-value" id="batteryVal">85%</span>
          <div class="battery-bar">
            <div class="battery-fill" id="batteryBar" style="width:85%"></div>
          </div>
        </div>
        <!-- 걸음수 -->
        <div class="complication-item">
          <span class="complication-icon">👟</span>
          <span class="complication-value" id="stepsVal">8,540</span>
          <span class="complication-label">STEPS</span>
        </div>
        <!-- 심박수 -->
        <div class="complication-item">
          <span class="complication-icon">❤️</span>
          <span class="complication-value" id="hrVal">72</span>
          <span class="complication-label">BPM</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="info-panel">
  <strong>📌 배경 이미지 적용 방법</strong>
  첨부하신 사진을 아래 파일명으로 저장하면 배경에 자동 적용됩니다:<br><br>
  <span class="tag">MyNewProject/background.jpg</span>
  <br><br>
  <span style="font-size:11px; color:#666;">현재는 어두운 그라디언트로 표시 중</span>
</div>

<script>
  // 베젤 눈금 생성
  const bezelG = document.getElementById('bezel-ticks');
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  for (let i = 0; i < 60; i++) {
    const angle = (i * 6) * Math.PI / 180;
    const isHour = i % 5 === 0;
    const r1 = 152, r2 = isHour ? 143 : 148;
    const x1 = 160 + r1 * Math.sin(angle);
    const y1 = 160 - r1 * Math.cos(angle);
    const x2 = 160 + r2 * Math.sin(angle);
    const y2 = 160 - r2 * Math.cos(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', isHour ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)');
    line.setAttribute('stroke-width', isHour ? '2' : '1');
    bezelG.appendChild(line);
  }

  // 시계판 눈금 (12시간)
  const markG = document.getElementById('hour-marks');
  const CX = 134, CY = 134;
  for (let i = 0; i < 12; i++) {
    const angle = (i * 30) * Math.PI / 180;
    const isMain = i % 3 === 0;
    const r1 = 118, r2 = isMain ? 106 : 112;
    const x1 = CX + r1 * Math.sin(angle);
    const y1 = CY - r1 * Math.cos(angle);
    const x2 = CX + r2 * Math.sin(angle);
    const y2 = CY - r2 * Math.cos(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', 'rgba(255,255,255,0.7)');
    line.setAttribute('stroke-width', isMain ? '2.5' : '1.5');
    line.setAttribute('stroke-linecap', 'round');
    markG.appendChild(line);
  }

  // 시계 업데이트
  function updateClock() {
    const now = new Date();
    const h = now.getHours() % 12;
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();

    const sDeg = (s + ms / 1000) * 6;
    const mDeg = (m + s / 60) * 6;
    const hDeg = (h + m / 60) * 30;

    document.getElementById('second-hand').setAttribute('transform', `rotate(${sDeg}, 134, 134)`);
    document.getElementById('minute-hand').setAttribute('transform', `rotate(${mDeg}, 134, 134)`);
    document.getElementById('hour-hand').setAttribute('transform', `rotate(${hDeg}, 134, 134)`);

    // 날짜
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('dateDisplay').textContent =
      `${days[now.getDay()]} · ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')}`;
  }

  // 심박수 시뮬레이션
  let hrBase = 72;
  function updateHR() {
    hrBase += Math.floor(Math.random() * 5) - 2;
    hrBase = Math.max(60, Math.min(95, hrBase));
    document.getElementById('hrVal').textContent = hrBase;
  }

  // 걸음수 시뮬레이션
  let steps = 8540;
  function updateSteps() {
    steps += Math.floor(Math.random() * 3);
    document.getElementById('stepsVal').textContent = steps.toLocaleString();
  }

  updateClock();
  setInterval(updateClock, 50);
  setInterval(updateHR, 3000);
  setInterval(updateSteps, 5000);

  // 배경 이미지 로드 시도
  const bgImg = document.getElementById('bgImage');
  const testImg = new Image();
  testImg.onload = () => { bgImg.style.opacity = '1'; };
  testImg.onerror = () => { bgImg.style.opacity = '0'; };
  testImg.src = 'background.jpg';
</script>

</body>
</html>
